name: k_poker
description: "K-Poker: 화투 로그라이크 카드 배틀 게임"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  audioplayers: ^6.0.0
  shared_preferences: ^2.2.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/cards/
    - assets/images/cards_manga_v2/
    - assets/images/characters/
    - assets/images/backgrounds/
    - assets/audio/sfx/
    - assets/audio/bgm/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "web/favicon.png"
